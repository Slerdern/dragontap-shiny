services:
  cellar:
    image: postgres:16-alpine
    ports:
      - "4183:5432"
    networks:
      - dragon_tap
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./cellar/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  innkeeper-java:
    build: ./innkeeper-java
    networks:
      - dragon_tap
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_DATABASE_PLATFORM:  ${SPRING_JPA_DATABASE_PLATFORM}
    ports:
      - "4185:4181"
    depends_on:
      - cellar

  board-react:
    build:
      context: ./board-react
      args:
        VITE_API_URL: ${VITE_API_URL}
    networks:
      - dragon_tap
    ports:
      - "4184:4184"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"        # seul service exposé à l'extérieur
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - innkeeper-java
      - board-react
    networks:
      - dragon_tap

networks:
  dragon_tap:
    driver: bridge

volumes:
  pg_data: