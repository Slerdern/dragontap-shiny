events {}

http {
    upstream board {
        server board-react:4184;
    }

    upstream innkeeper {
        server innkeeper-java:4181;
    }

    server {
        listen 80;
        location / {
            proxy_pass http://board;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/ {
            proxy_pass http://innkeeper;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}