# Server
server.port=${SERVER_PORT:4181}

# Datasource
# DATABASE_URL doit être au format JDBC :
#   jdbc:postgresql://localhost:4183/dragontap?user=dragontap&password=dragontap
# (différent du format Node.js : postgres://user:pass@host/db)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:4183/dragontap?user=dragontap&password=dragontap}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Jackson : configuré via JacksonConfig.java (incompatibilité des propriétés avec Jackson 3.x)
